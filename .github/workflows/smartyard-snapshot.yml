name: SmartYard media compatibility

on:
  pull_request:
    paths:
      - 'dvr-engine/src/snapshot.ts'
      - 'dvr-engine/src/index.ts'
      - 'dvr-engine/package.json'
      - 'scripts/patch-smartyard-snapshot-route.py'
      - 'scripts/patch-smartyard-archive-limit.py'
      - '.github/workflows/smartyard-snapshot.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dvr-engine/package-lock.json

      - name: Validate runtime patchers twice
        run: |
          python3 -m py_compile \
            scripts/patch-smartyard-snapshot-route.py \
            scripts/patch-smartyard-archive-limit.py

          for _ in 1 2; do
            python3 scripts/patch-smartyard-snapshot-route.py --project-dir "$PWD"
            python3 scripts/patch-smartyard-archive-limit.py --project-dir "$PWD"
          done

          grep -q "registerSnapshotRoute" dvr-engine/src/index.ts
          test "$(grep -c "registerSnapshotRoute(app)" dvr-engine/src/index.ts)" -eq 1
          test "$(grep -c "const maxArchivePlaybackSeconds" dvr-engine/src/index.ts)" -eq 1
          test "$(grep -c "parseRange(req, res, maxArchivePlaybackSeconds)" dvr-engine/src/index.ts)" -eq 1
          grep -q 'DVR_ARCHIVE_PLAYBACK_MAX_SECONDS || 3 \* 60 \* 60' dvr-engine/src/index.ts

      - name: Build DVR engine
        working-directory: dvr-engine
        run: |
          npm ci --include=dev
          npm run build

      - name: Validate compiled compatibility routes
        run: |
          test -f dvr-engine/dist/snapshot.js
          grep -q 'snapshot.jpg' dvr-engine/dist/snapshot.js
          grep -q 'x-newdomofon-snapshot-source' dvr-engine/dist/snapshot.js
          grep -q 'DVR_ARCHIVE_PLAYBACK_MAX_SECONDS' dvr-engine/dist/index.js
          grep -q 'maxArchivePlaybackSeconds' dvr-engine/dist/index.js
