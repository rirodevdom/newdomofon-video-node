name: Offline node update bundle

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm
          cache-dependency-path: dvr-engine/package-lock.json

      - name: Validate scripts
        run: |
          bash -n offline-update.sh
          bash -n scripts/build-offline-update-bundle.sh
          bash -n update-installed-project.sh

      - name: Build and offline-verify bundle
        run: |
          OUTPUT_DIR="$RUNNER_TEMP/offline-bundles" \
            bash scripts/build-offline-update-bundle.sh

      - name: Inspect bundle metadata
        run: |
          cat "$RUNNER_TEMP"/offline-bundles/*.txt
          sha256sum -c "$RUNNER_TEMP"/offline-bundles/*.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: newdomofon-video-node-offline-${{ github.sha }}
          path: |
            ${{ runner.temp }}/offline-bundles/*.tar.gz
            ${{ runner.temp }}/offline-bundles/*.tar.gz.sha256
            ${{ runner.temp }}/offline-bundles/*.txt
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
