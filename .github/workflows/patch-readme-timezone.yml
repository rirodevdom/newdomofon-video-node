name: Apply Moscow timezone README update

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/moscow-timezone
          fetch-depth: 0

      - name: Update timezone documentation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          old = '''timedatectl set-timezone UTC
systemctl enable --now systemd-timesyncd
timedatectl status'''
          new = '''timedatectl set-timezone Europe/Moscow
systemctl enable --now systemd-timesyncd
timedatectl status
date '+%Y-%m-%d %H:%M:%S %Z %z' '''.rstrip()
          if old not in text:
              raise SystemExit('Expected UTC block was not found in README.md')
          text = text.replace(old, new, 1)
          marker = '''```

## 3. Подготовьте отдельный DVR-диск'''
          addition = '''```

Ожидаемая временная зона:

```text
Time zone: Europe/Moscow
MSK +0300
```

Master и все video node должны использовать московское время (`Europe/Moscow`), чтобы временные метки архивных каталогов, событий и журналов совпадали. После изменения временной зоны перезапуск DVR service не требуется.

## 3. Подготовьте отдельный DVR-диск'''
          if marker not in text:
              raise SystemExit('Expected section marker was not found in README.md')
          path.write_text(text.replace(marker, addition, 1), encoding='utf-8')
          PY

      - name: Commit README and remove temporary workflow
        run: |
          rm -f .github/workflows/patch-readme-timezone.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md .github/workflows/patch-readme-timezone.yml
          git commit -m "Document Moscow timezone"
          git push origin HEAD:docs/moscow-timezone
